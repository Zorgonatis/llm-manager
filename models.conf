# LLM Model Configurations
# All models stored in ~/.llm/models/ (or wherever models_dir points)
#
# Format:
#   name, description, build = metadata for the manager
#   <args> block = raw CLI args passed to llama-server (including -m)
#
# New llama.cpp flags? Just add them to the <args> block. No wrapper changes needed.

# =================== HUGGINGFACE (auto-download) ===================

[hf-verify]
name="Qwen3 0.6B (HF)"
description="Tiny model for install verification - auto-downloaded from HuggingFace"
build="/opt/llama.cpp"
<args>
--hf-repo Qwen/Qwen3-0.6B-GGUF \
--hf-file qwen3-0.6b-q8_0.gguf \
--ctx-size 4096 \
--threads 4
</args>


