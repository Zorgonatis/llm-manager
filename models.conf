# =================== HUGGINGFACE (auto-download) ===================

[hf-verify]
name="Qwen3 0.6B (HF)"
description="Tiny model for install verification - auto-downloaded from HuggingFace"
backend=cpu
<args>
--hf-repo Qwen/Qwen3-0.6B-GGUF \
--hf-file qwen3-0.6b-q8_0.gguf \
--ctx-size 4096 \
--threads 4
</args>
