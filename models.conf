model="$HOME/.llm/models/qwen-122b/vision-Q4_K/Q4_K-GGUF-00001-of-00008.gguf"
<args>
--chat-template-file $HOME/.llm/models/qwen-122b/vision-Q4_K/chat_template-vl-think.jinja \
--ctx-size 262144 \
--no-mmap \
--threads -1 \
--device Vulkan0,Vulkan1 \
--cache-type-v q8_0 \
--cache-type-k q8_0 \
--parallel 1 \
--split-mode layer \
--tensor-split 0.72,0.28 \
--gpu-layers 99 \
--n-cpu-moe 21
</args>

