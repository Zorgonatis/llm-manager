# LLM Model Configurations
#
# Models reference a backend (defined in llm.conf) and optionally a profile.
# The <args> block contains raw CLI flags passed to the server binary.
#
# Profile system: Define reusable arg blocks with [profile.<name>] sections.
# Models reference them with: profile=<name>
# Merge order: binary + backend_args + profile_args + model_args + extra_args + --host --port + [--device]
#
# Backend can be overridden at runtime:
#   llm serve <model> [profile] [backend]
#   llm serve my-model rocm              # Override backend
#   llm serve my-model max               # Override profile
#   llm serve my-model max rocm          # Override both

# =================== PROFILES ===================
# Reusable <args> blocks for INFRASTRUCTURE flags only.
# Models inherit profile args before their own args, so model args override
# profile defaults. Sampling params (temp, top-p, top-k, min-p) are
# model-specific and must live in each model's <args> block — NOT in profiles.

[profile.max]
# Full VRAM commitment — 262k ctx, single slot, quantized KV cache.
# For models that fit entirely in GPU memory without needing --fit.
<args>
--ctx-size 262144 \
--threads 8 \
--parallel 1 \
--cache-type-v q8_0 --cache-type-k q8_0 \
--flash-attn auto --jinja --no-mmap \
--gpu-layers 999
</args>

[profile.fitmax]
# Auto-fit to VRAM with 128k ctx floor. For models that may not fit at max ctx.
# --fit (on by default) will shrink ctx down to --fit-ctx if needed.
<args>
--threads 8 \
--parallel 1 \
--fit-ctx 128000 \
--cache-type-v q8_0 --cache-type-k q8_0 \
--flash-attn auto --jinja --no-mmap
</args>

[profile.high-parallel]
# 4 parallel slots sharing 128k ctx (32k per slot). For concurrent requests
# where you'd trade single-request depth for throughput.
<args>
--threads 8 \
--parallel 4 \
--ctx-size 128000 \
--cache-type-v q8_0 --cache-type-k q8_0 \
--flash-attn auto --jinja --no-mmap \
--gpu-layers 999 --main-gpu 0
</args>

[profile.vllm-gemma]
# vLLM Gemma family: fp8 KV cache, tool/reasoning parsers, 4 concurrent seqs.
<args>
--kv-cache-dtype fp8 --trust-remote-code \
--max-num-seqs 4 --enable-auto-tool-choice \
--tool-call-parser gemma4 --reasoning-parser gemma4
</args>

# =================== TEST MODEL ===================
# Uses HuggingFace direct loading (-hf) — no local file needed.
# Serves on the CPU backend so it works anywhere.

[test-model]
name="Test Model (Tiny)"
description="TinyLlama 1.1B via HF — for testing, CPU backend"
backend=cpu
<args>
-hf TinyLlama/TinyLlama-1.1B-Chat-v1.0:Q4_K_M \
--ctx-size 2048 \
--threads 2 \
--parallel 1 \
--temp 0.8 --top-p 0.95
</args>
