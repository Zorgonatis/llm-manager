# =================== MULTI-GPU VULKAN ===================

[qwen-122b-multi]
name="Qwen3.5 122B"
description="122B multimodal - split across Vulkan0/Vulkan1"
build="/data-fast/apps/llama.cpp/install-vulkan"
model="$HOME/.llm/models/qwen-122b/UD_Q4/Qwen3.5-122B-A10B-UD-Q4_K_XL-00001-of-00003.gguf"
<args>
--ctx-size 262144 \
--no-mmap \
--threads 8 \
--device Vulkan0,Vulkan1 \
--cache-type-v q8_0 \
--cache-type-k q8_0 \
--parallel 1 \
--split-mode layer \
--tensor-split 0.7,0.3 \
--gpu-layers 99 \
--n-cpu-moe 21 \
--kv-unified
</args>

[qwen-122b-q4multi]
