# =================== MULTI-GPU (Vulkan split) ===================

#[my-model-multigpu]
#name="My Model Multi-GPU"
#description="Example multi-GPU Vulkan model split across two devices"
#backend=vulkan
#<args>
#-m $HOME/.llm/models/my-model/my-model-Q4_K_M.gguf \
#--ctx-size 65536 \
#--no-mmap \
#--threads 8 \
#--device Vulkan0,Vulkan1 \
#--parallel 1 \
#--split-mode layer \
#--tensor-split 0.7,0.3 \
#--gpu-layers 99 \
#--cache-type-v q8_0 \
#--cache-type-k q8_0
#</args>

