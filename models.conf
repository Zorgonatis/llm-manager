# LLM Model Configurations
# All models stored in ~/.llm/models/
#
# Format:
#   name, description, build, model = metadata
#   <args> block = raw CLI args passed to llama-server
#
# New llama.cpp flags? Just add them to the <args> block. No wrapper changes needed.

# =================== CPU MODELS (ik_llama.cpp) ===================

[gliese-vision]
name="Gliese Qwen3.5 4B Vision"
description="4B multimodal captioning with CLIP - CPU only"
build="/data-fast/apps/ik_llama.cpp"
model="$HOME/.llm/models/gliese/Gliese-Qwen3.5-4B-Abliterated-Caption.IQ4_KT.gguf"
<args>
--mmproj $HOME/.llm/models/gliese/Gliese-Qwen3.5-4B-Abliterated-Caption.mmproj-f16.gguf \
--ctx-size 4096 \
--threads 4 \
--cache-type-v q8_0 \
--cache-type-k q8_0 \
-rtr
</args>

[qwen-4b]
name="Qwen3 4B"
description="4B text model - lightweight (Pi compatible)"
build="/data-fast/apps/ik_llama.cpp"
model="$HOME/.llm/models/qwen/qwen3-4b-IQ4_XS.gguf"
<args>
--ctx-size 16384 \
--threads 4 \
--cache-type-v q8_0 \
--cache-type-k q8_0 \
-rtr
</args>

# =================== VULKAN MODELS ===================

[qwen-9b-vulkan]
name="Qwen3.5 9B Vulkan"
description="9B model - Vulkan GPU"
build="/data-fast/apps/llama.cpp/install-vulkan"
model="$HOME/.llm/models/qwen/qwen3.5-9b-Q4_K_S.gguf"
<args>
--ctx-size 8192 \
--threads -1 \
--device Vulkan1 \
--parallel 1 \
--flash-attn auto \
--jinja \
--temp 1.0 \
--top-p 0.95
</args>

