# LLM Model Configurations
# All models stored in ~/.llm/models/ (or wherever models_dir points)
#
# Format:
#   name, description, backend = metadata for the manager
#   <args> block = raw CLI args passed to llama-server (including -m)
#
# The `backend` field references a backend defined in llm.conf.
# Add new backends there - no code changes needed to support new builds.
#
# New llama.cpp flags? Just add them to the <args> block. No wrapper changes needed.
#
# All examples below are commented out — uncomment and edit to use.

# =================== CPU MODELS ===================

#[my-model-cpu]
#name="My Model CPU"
#description="Example CPU-only model"
#backend=cpu
#<args>
#-m $HOME/.llm/models/my-model/my-model-Q4_K_M.gguf \
#--ctx-size 8192 \
#--threads 4
#</args>

# =================== VULKAN MODELS ===================

#[my-model-vulkan]
#name="My Model Vulkan"
#description="Example Vulkan GPU model"
#backend=vulkan
#<args>
#-m $HOME/.llm/models/my-model/my-model-Q4_K_M.gguf \
#--ctx-size 8192 \
#--threads -1 \
#--device Vulkan0 \
#--parallel 1 \
#--flash-attn auto \
#--jinja \
#--temp 1.0 \
#--top-p 0.95
#</args>

