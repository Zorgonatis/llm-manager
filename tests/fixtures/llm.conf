# Test fixture: llm.conf for bats tests
# Uses real llama.cpp CPU binary + placeholder GPU backends

models_dir=$llm_dir/models
service_host=127.0.0.1
service_port=14444
instance_port_start=18081

[backend.cpu]
binary=/data-fast/apps/llama.cpp/llama-server
<extra_args>
--alias test
</extra_args>

[backend.cuda]
binary=/data-fast/apps/llama.cpp/install-cuda/bin/llama-server
device=CUDA0
<extra_args>
--alias test
</extra_args>

[backend.rocm]
binary=/data-fast/apps/llama.cpp/install-rocm/bin/llama-server
device=ROCm0
<extra_args>
--alias test
</extra_args>

[backend.vulkan]
binary=/data-fast/apps/llama.cpp/install-vulkan/bin/llama-server
device=Vulkan0
<extra_args>
--alias test
</extra_args>

[backend.test]
binary=/data-fast/apps/llama.cpp/llama-server
<extra_args>
--alias test
</extra_args>
