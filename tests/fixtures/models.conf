# Test fixture: models.conf for bats tests
# Includes profiles + test model definitions

# =================== PROFILES ===================

[profile.max]
# Full VRAM commitment — max ctx, single slot
<args>
--ctx-size 262144 \
--threads 2 \
--parallel 1 \
--cache-type-v q8_0 --cache-type-k q8_0 \
--flash-attn auto --jinja --no-mmap \
--gpu-layers 999
</args>

[profile.fitmax]
# Auto-fit to VRAM with 128k ctx floor
<args>
--threads 2 \
--parallel 1 \
--fit-ctx 128000 \
--cache-type-v q8_0 --cache-type-k q8_0 \
--flash-attn auto --jinja --no-mmap
</args>

[profile.high-parallel]
# 4 parallel slots sharing 128k ctx
<args>
--threads 2 \
--parallel 4 \
--ctx-size 128000 \
--cache-type-v q8_0 --cache-type-k q8_0 \
--flash-attn auto --jinja --no-mmap \
--gpu-layers 999 --main-gpu 0
</args>

# =================== TEST MODELS ===================

[test-tiny]
name="Test Tiny (HF)"
description="TinyLlama 1.1B via HuggingFace — CPU, no profile"
backend=cpu
<args>
-hf Qwen/Qwen3-0.6B-GGUF \
--ctx-size 2048 \
--threads 2 \
--parallel 1 \
--temp 0.8 --top-p 0.95
</args>

[test-max]
name="Test Max Profile"
description="TinyLlama with max profile — tests profile merging"
backend=cpu
profile=max
<args>
-hf Qwen/Qwen3-0.6B-GGUF \
--temp 0.6 --min-p 0.0 --top-p 0.95 --top-k 20
</args>

[test-device-override]
name="Test Device Override"
description="Model with --device in args — backend device should NOT be injected"
backend=vulkan
profile=max
<args>
-hf Qwen/Qwen3-0.6B-GGUF \
--device Vulkan0,Vulkan1 \
--temp 0.8 --top-p 0.95
</args>

[test-no-backend]
name="Test No Backend"
description="Model with missing backend — for prune/error testing"
backend=nonexistent
<args>
-hf Qwen/Qwen3-0.6B-GGUF \
--ctx-size 2048
</args>

[test-no-args]
name="Test No Args Block"
description="Model with no args block — for error testing"
backend=cpu
