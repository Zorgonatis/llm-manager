# LLM Infrastructure Configuration
# These settings control paths and ports for the LLM management system
#
# Copy to ~/.llm/llm.conf and adjust paths to match your system.
# Supports $HOME and ~ expansion in values.

# Directory for GGUF model files (can be outside llm_dir for large storage)
# Default: $llm_dir/models
models_dir=$llm_dir/models

# Host binding for services (default: 0.0.0.0)
service_host=0.0.0.0

# Port for the main systemd service (persistent)
service_port=4444

# Starting port for temporary instances (increments from here)
instance_port_start=8081

# =================== BACKEND DEFINITIONS ===================
# Each backend specifies:
#   - binary: path to the server executable (supports $HOME, ~ expansion)
#   - venv:   optional virtualenv to activate before running (vLLM, etc.)
#   - device: optional GPU device auto-injected as --device (unless model args
#             already contain --device, e.g. multi-GPU configs)
#   - <backend_args>: optional prefix subcommands (e.g. vllm's "serve")
#   - <extra_args>:   optional trailing flags appended after model args
#
# Merge order: binary + backend_args + profile_args + model_args
#               + extra_args + --host --port + [--device]
#
# Backend can be overridden at runtime:
#   llm serve <model> cuda          # Override backend
#   llm serve <model> max cuda      # Override profile AND backend

[backend.cpu]
binary=/data-fast/apps/llama.cpp/install-cpu/bin/llama-server
<extra_args>
--alias local
</extra_args>

[backend.cuda]
binary=/data-fast/apps/llama.cpp/install-cuda/bin/llama-server
device=CUDA0
<extra_args>
--alias local
</extra_args>

[backend.rocm]
binary=/data-fast/apps/llama.cpp/install-rocm/bin/llama-server
device=ROCm0
<extra_args>
--alias local
</extra_args>

[backend.vulkan]
binary=/data-fast/apps/llama.cpp/install-vulkan/bin/llama-server
device=Vulkan1
<extra_args>
--alias local
</extra_args>

[backend.ik]
binary=/data-fast/apps/ik_llama.cpp/build/bin/llama-server
device=CUDA0
<extra_args>
--alias local
</extra_args>

[backend.vllm]
binary=vllm
venv=/data-fast/apps/vllm/.venv
<backend_args>
serve
</backend_args>
<extra_args>
--served-model-name local
</extra_args>
