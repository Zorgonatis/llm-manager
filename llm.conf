# LLM Infrastructure Configuration
# These settings control paths and ports for the LLM management system

# Directory for GGUF model files (can be outside llm_dir for large storage)
# Supports $HOME and ~ expansion. Default: $llm_dir/models
# Example: models_dir=/mnt/nvme/models
models_dir=$llm_dir/models

# Port for the main systemd service (persistent)
service_port=4444

# Starting port for temporary instances (increments from here)
instance_port_start=8081

# =================== BACKEND DEFINITIONS ===================
# Add your llama.cpp build variants here. Each backend specifies the path
# to its llama-server executable. Models reference these by name.
#
# To add a new backend, just add a new [backend.<name>] section:
#   [backend.my-custom-build]
#   binary=/path/to/llama-server
#
# Then in models.conf: backend=my-custom-build

[backend.cpu]
binary=/opt/llama.cpp/bin/llama-server

[backend.vulkan]
binary=/opt/llama.cpp.vulkan/bin/llama-server

[backend.cuda]
binary=/opt/llama.cpp.cuda/bin/llama-server

[backend.rocm]
binary=/opt/llama.cpp.rocm/bin/llama-server
